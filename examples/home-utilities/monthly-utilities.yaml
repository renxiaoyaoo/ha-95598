# Home Assistant package for manual monthly water/gas readings.
#
# Enter the cumulative meter readings in the input_number helpers.
# Home Assistant utility_meter calculates monthly usage from the reading delta,
# and template sensors calculate monthly charges from the unit prices.

input_number:
  water_meter_reading:
    name: 水表读数
    min: 0
    max: 999999
    step: 0.01
    mode: box
    unit_of_measurement: "m³"
    icon: mdi:water

  water_unit_price:
    name: 水价
    min: 0
    max: 100
    step: 0.0001
    mode: box
    unit_of_measurement: "CNY/m³"
    icon: mdi:cash

  gas_meter_reading:
    name: 燃气表读数
    min: 0
    max: 999999
    step: 0.01
    mode: box
    unit_of_measurement: "m³"
    icon: mdi:fire

  gas_unit_price:
    name: 燃气价
    min: 0
    max: 100
    step: 0.0001
    mode: box
    unit_of_measurement: "CNY/m³"
    icon: mdi:cash

template:
  - sensor:
      - name: Water Meter Reading Total
        unique_id: manual_water_meter_reading_total_v2
        state: "{{ states('input_number.water_meter_reading') | float(0) }}"
        unit_of_measurement: "m³"
        device_class: water
        state_class: total_increasing
        icon: mdi:water

      - name: Gas Meter Reading Total
        unique_id: manual_gas_meter_reading_total_v2
        state: "{{ states('input_number.gas_meter_reading') | float(0) }}"
        unit_of_measurement: "m³"
        device_class: gas
        state_class: total_increasing
        icon: mdi:fire

      - name: Monthly Water Charge
        unique_id: manual_monthly_water_charge_v2
        state: >
          {{ (states('sensor.monthly_water_usage') | float(0)
              * states('input_number.water_unit_price') | float(0)) | round(2) }}
        unit_of_measurement: "CNY"
        device_class: monetary
        state_class: total
        icon: mdi:cash

      - name: Monthly Gas Charge
        unique_id: manual_monthly_gas_charge_v2
        state: >
          {{ (states('sensor.monthly_gas_usage') | float(0)
              * states('input_number.gas_unit_price') | float(0)) | round(2) }}
        unit_of_measurement: "CNY"
        device_class: monetary
        state_class: total
        icon: mdi:cash

utility_meter:
  monthly_water_usage:
    name: 本月用水量
    source: sensor.water_meter_reading_total
    cycle: monthly

  monthly_gas_usage:
    name: 本月燃气用量
    source: sensor.gas_meter_reading_total
    cycle: monthly
