name: Field Data Badge

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update badge data
        run: python3 scripts/tools/update_field_data_badge.py

      - name: Commit badge data
        run: |
          if git diff --quiet docs/field-data-badge.json; then
            echo "badge data unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/field-data-badge.json
          git commit -m "Update field data badge"
          git push
